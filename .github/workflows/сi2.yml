name: CI

on:
  pull_request:
    branches: [master]  # ← меняем main на master

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run Maven tests
        run: ./mvnw.cmd -B clean test